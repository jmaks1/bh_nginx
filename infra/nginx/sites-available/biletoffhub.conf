# Разделитель для добавления метки from=biletoffhub к исходным query-параметрам
map $request_uri $bh_moved_sep {
    "~\?" "&";
    default "?";
}

server {
    server_name biletoffhub.ru www.biletoffhub.ru;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/biletoffhub.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/biletoffhub.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Мягкий переезд на vsebilety.pro: редиректим только публичные разделы.
    # Кабинеты (/auth, /dashboard, /admin, /customer), страницы событий и
    # организаторов (/event, /user), юридические документы и API остаются
    # на biletoffhub, пока на старой платформе идут продажи.
    location = / {
        return 301 https://vsebilety.pro$request_uri${bh_moved_sep}from=biletoffhub;
    }

    location ~ ^/(afisha|blog|faq|contacts|tariffs|create-event)(/|$) {
        return 301 https://vsebilety.pro$request_uri${bh_moved_sep}from=biletoffhub;
    }

    location / {
        include snippets/proxy-common.conf;
        include snippets/proxy-ws.conf;
        proxy_pass http://frontend_biletoffhub;
    }
}

server {
    listen 80;
    server_name biletoffhub.ru www.biletoffhub.ru;
    return 301 https://$host$request_uri;
}
